name: RDP

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Update System
      run: sudo apt update

    - name: Install Desktop
      run: |
        sudo apt install xfce4 xfce4-goodies -y
        sudo apt install firefox -y

    - name: Install XRDP
      run: |
        sudo apt install xrdp -y
        sudo systemctl start xrdp

    - name: Install Virtual Display
      run: sudo apt install xvfb -y

    - name: Start Sepolia Faucet Mining
      run: |
        xvfb-run firefox "https://sepolia-faucet.pk910.de/?address=0xA0cECc24e35883d7eb8c6869474E7BDb30b4FfDc"

    - name: Keep Alive
      run: sleep 21600
